name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: node scripts/prepare-prisma.js && npx prisma generate

      - run: npm run build
        env:
          DATABASE_URL: file:./ci.db
          SESSION_SECRET: ci-secret-min-32-characters-long
          ADMIN_SECRET: ci-admin-secret
